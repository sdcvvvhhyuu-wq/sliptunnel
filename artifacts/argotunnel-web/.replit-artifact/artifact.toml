kind = "web"
previewPath = "/"
title = "ArgoTunnel Ultimate"
version = "1.0.0"
id = "artifacts/argotunnel-web"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24257

[services.development]
run = "pnpm --filter @workspace/argotunnel-web run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/argotunnel-web", "run", "build" ]
publicDir = "artifacts/argotunnel-web/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24257"
BASE_PATH = "/"
